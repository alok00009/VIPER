<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPER AI | Central Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Poppins', sans-serif; }
        .admin-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 16px; }
        input { background: #0f172a !important; border: 1px solid #1e293b !important; color: white; outline: none; }
        .status-active { color: #10b981; }
        .status-pending { color: #f59e0b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black text-red-500 tracking-tighter">VIPER ADMIN CENTRAL</h1>
                <p class="text-gray-500 text-sm">Manage Users, Access Time, and Device Bans</p>
            </div>
            <div id="adminStatus" class="bg-slate-900 px-6 py-3 rounded-2xl border border-slate-800 text-sm">
                Checking Admin Auth...
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6">
                <div class="admin-card p-6">
                    <h3 class="text-lg font-bold mb-4 text-red-400">Quick Actions</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase">User UID</label>
                            <input type="text" id="targetUid" class="w-full p-3 rounded-xl mt-1" placeholder="Paste UID here">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase">Access Days</label>
                            <input type="number" id="targetDays" class="w-full p-3 rounded-xl mt-1" placeholder="e.g. 30">
                        </div>
                        <button onclick="updateUserAccess()" class="w-full bg-red-600 hover:bg-red-700 py-3 rounded-xl font-bold transition-all">GRANT ACCESS</button>
                    </div>
                </div>

                <div class="admin-card p-6 border-white/10">
                    <h3 class="text-lg font-bold mb-4">Security</h3>
                    <input type="text" id="banId" class="w-full p-3 rounded-xl mb-3" placeholder="Device ID">
                    <button onclick="blockDevice()" class="w-full bg-white text-black py-3 rounded-xl font-bold">BAN DEVICE</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="admin-card p-6 min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">User Database</h3>
                        <button onclick="loadUsers()" class="text-xs bg-slate-800 px-3 py-1 rounded-lg">Refresh List</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="text-gray-500 border-b border-slate-800">
                                <tr>
                                    <th class="pb-3">User Email / UID</th>
                                    <th class="pb-3">Status</th>
                                    <th class="pb-3">Expiry</th>
                                    <th class="pb-3">Action</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // Same config as your main app
    const firebaseConfig = {
        apiKey: "AIzaSyD6f_ghtCQP2q41QXGkld1l8KhX6z7mYgU",
        authDomain: "fuck-u-1fd9c.firebaseapp.com",
        databaseURL: "https://fuck-u-1fd9c-default-rtdb.firebaseio.com",
        projectId: "fuck-u-1fd9c",
        storageBucket: "fuck-u-1fd9c.firebasestorage.app",
        messagingSenderId: "418045703508",
        appId: "1:418045703508:web:736581cc3132dab22fc4c1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userSnap = await get(ref(db, 'users/' + user.uid));
            if (userSnap.val()?.role === 'admin') {
                document.getElementById('adminStatus').innerText = "Logged in as Admin: " + user.email;
                loadUsers();
            } else {
                alert("Access Denied: You are not an admin!");
                window.location.href = "index.html"; // Redirect to your main app
            }
        } else {
            document.getElementById('adminStatus').innerText = "Please Login first on the main app.";
        }
    });

    // Global Functions
    window.loadUsers = () => {
        const userRef = ref(db, 'users');
        onValue(userRef, (snapshot) => {
            const users = snapshot.val();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = "";
            
            for (let uid in users) {
                const u = users[uid];
                if(u.role === 'admin') continue; // Hide admins from list

                const expiryStr = u.expiry > Date.now() 
                    ? new Date(u.expiry).toLocaleDateString() 
                    : "Expired/No Access";

                const row = `
                    <tr class="border-b border-slate-900/50">
                        <td class="py-4">
                            <p class="font-bold">${u.email}</p>
                            <p class="text-[10px] text-gray-600">${uid}</p>
                            <p class="text-[9px] text-cyan-700">Device: ${u.lastDeviceId || 'N/A'}</p>
                        </td>
                        <td class="py-4">
                            <span class="${u.access === 'active' ? 'status-active' : 'status-pending'} font-bold">
                                ${u.access.toUpperCase()}
                            </span>
                        </td>
                        <td class="py-4 text-gray-400">${expiryStr}</td>
                        <td class="py-4">
                            <button onclick="copyUid('${uid}')" class="text-xs bg-slate-800 px-2 py-1 rounded">Copy ID</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            }
        });
    };

    window.updateUserAccess = async () => {
        const uid = document.getElementById('targetUid').value;
        const days = parseInt(document.getElementById('targetDays').value);
        if(!uid || isNaN(days)) return alert("Enter UID and Days");

        const newExpiry = Date.now() + (days * 24 * 60 * 60 * 1000);
        await update(ref(db, 'users/' + uid), {
            access: 'active',
            expiry: newExpiry
        });
        alert("User Updated!");
    };

    window.blockDevice = async () => {
        const id = document.getElementById('banId').value;
        if(!id) return alert("Enter Device ID");
        await set(ref(db, 'bannedDevices/' + id), { bannedAt: Date.now() });
        alert("Device Permanently Banned!");
    };

    window.copyUid = (id) => {
        navigator.clipboard.writeText(id);
        alert("UID Copied: " + id);
        document.getElementById('targetUid').value = id;
    };

</script>
</body>
</html>
