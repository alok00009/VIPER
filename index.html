<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPER AI | Premium Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Poppins', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .safe-tile { background: #0891b2 !important; border: 2px solid #22d3ee !important; box-shadow: 0 0 15px #22d3ee; }
        .lock-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 24px; }
        input { background: #0f172a !important; border: 1px solid #1e293b !important; color: white; outline: none; }
        .hidden { display: none; }
        .modal-bg { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); }
    </style>
</head>
<body oncontextmenu="return false">

<div id="authSection" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-card p-8 w-full max-w-md shadow-2xl">
        <div class="flex justify-center gap-6 mb-8 border-b border-slate-800 pb-4">
            <button onclick="toggleAuth('login')" id="loginTab" class="font-bold text-cyan-400">LOGIN</button>
            <button onclick="toggleAuth('reg')" id="regTab" class="font-bold text-gray-500">REGISTER</button>
        </div>
        <div id="loginForm" class="space-y-4">
            <input type="email" id="lEmail" placeholder="Email" class="w-full p-4 rounded-2xl">
            <input type="password" id="lPass" placeholder="Password" class="w-full p-4 rounded-2xl">
            <button id="btnLogin" class="w-full bg-cyan-600 py-4 rounded-2xl font-bold uppercase shadow-lg">Login Now</button>
        </div>
        <div id="regForm" class="hidden space-y-4">
            <input type="email" id="rEmail" placeholder="New Email" class="w-full p-4 rounded-2xl">
            <input type="password" id="rPass" placeholder="Set Password (6+)" class="w-full p-4 rounded-2xl">
            <button id="btnReg" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold uppercase shadow-lg">Create Account</button>
        </div>
        <p id="msg" class="text-center text-xs font-bold mt-4 h-4 text-cyan-400"></p>
    </div>
</div>

<div id="dashboardPage" class="hidden container mx-auto p-4 max-w-lg min-h-screen relative">
    
    <nav class="flex justify-between items-center mb-6 py-2 border-b border-slate-800">
        <h1 class="text-cyan-400 font-black text-xl tracking-tighter uppercase">Viper AI</h1>
        <button onclick="togglePremium()" class="text-gray-400 text-2xl px-2 font-bold">⋮</button>
    </nav>

    <div id="premiumModal" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center p-6">
        <div class="glass-card p-6 w-full max-w-xs text-center border-cyan-500/40">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-cyan-400 font-bold uppercase text-sm">Buy Plans</h3>
                <button onclick="togglePremium()" class="text-gray-500 text-xl">✕</button>
            </div>
            <div class="bg-white p-2 rounded-xl inline-block mb-4">
                <img src="1000128238.jpg" alt="UPI QR" class="w-44 h-44 object-contain">
            </div>
            <div class="space-y-2 text-left text-[11px] mb-4">
                <div class="flex justify-between border-b border-slate-800 pb-1"><span>🥈 Silver (3/Day)</span><span class="text-white">₹49</span></div>
                <div class="flex justify-between border-b border-slate-800 pb-1"><span>🥇 Gold (50/Day)</span><span class="text-yellow-500">₹99</span></div>
                <div class="flex justify-between border-b border-slate-800 pb-1"><span>💎 Diamond (Unlimited)</span><span class="text-cyan-400">₹199</span></div>
            </div>
            <p class="text-[9px] text-gray-500 mb-4">Send screenshot to admin after payment.</p>
            <button onclick="logout()" class="w-full bg-red-600/10 text-red-500 py-2 rounded-lg text-[10px] font-bold border border-red-500/20 uppercase">Logout</button>
        </div>
    </div>

    <div class="glass-card p-6 mb-6">
        <div class="flex justify-between items-center mb-4">
            <span id="planLabel" class="text-[10px] bg-cyan-600 px-3 py-1 rounded-full text-white font-bold tracking-widest uppercase">Silver</span>
            <span id="limitLabel" class="text-[10px] text-gray-400 font-bold">Limit: 3/3</span>
        </div>
        <input type="number" id="pastNo" placeholder="Last Number" class="w-full p-4 rounded-2xl text-center text-3xl font-black mb-4">
        <div class="text-center py-4 border-y border-slate-800/50 my-4">
            <div id="wRes" class="text-5xl font-black my-2">---</div>
            <div id="goldBox" class="hidden mt-4 pt-4 border-t border-slate-800">
                <div class="flex justify-center gap-4">
                    <div id="n1" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center font-bold border border-slate-700">-</div>
                    <div id="n2" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center font-bold border border-slate-700">-</div>
                    <div id="n3" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center font-bold border border-slate-700">-</div>
                </div>
            </div>
        </div>
        <button id="runBtn" onclick="runWingo()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg active:scale-95 transition-all">Get Prediction</button>
    </div>

    <div class="glass-card p-6 relative overflow-hidden h-[340px]">
        <div id="mLock" class="lock-screen hidden">
            <span class="text-3xl mb-2">💎</span>
            <p class="text-xs font-bold uppercase">Diamond Required</p>
        </div>
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xs font-bold text-emerald-400 uppercase">Mines Grid</h3>
            <button onclick="runMines()" class="bg-emerald-600 px-4 py-1 rounded text-[10px] font-bold">SCAN</button>
        </div>
        <div id="mGrid" class="grid grid-cols-5 gap-2 h-[220px]"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD6f_ghtCQP2q41QXGkld1l8KhX6z7mYgU",
        authDomain: "fuck-u-1fd9c.firebaseapp.com",
        databaseURL: "https://fuck-u-1fd9c-default-rtdb.firebaseio.com",
        projectId: "fuck-u-1fd9c",
        storageBucket: "fuck-u-1fd9c.firebasestorage.app",
        messagingSenderId: "418045703508",
        appId: "1:418045703508:web:736581cc3132dab22fc4c1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    window.toggleAuth = (m) => {
        document.getElementById('loginForm').classList.toggle('hidden', m !== 'login');
        document.getElementById('regForm').classList.toggle('hidden', m !== 'reg');
    };

    document.getElementById('btnReg').addEventListener('click', async () => {
        const e = document.getElementById('rEmail').value, p = document.getElementById('rPass').value;
        try {
            const cred = await createUserWithEmailAndPassword(auth, e, p);
            await set(ref(db, 'users/' + cred.user.uid), { plan: 'silver', usage: 0, email: e });
            location.reload();
        } catch (err) { alert(err.message); }
    });

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const e = document.getElementById('lEmail').value, p = document.getElementById('lPass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch (err) { alert("Wrong Login!"); }
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await get(ref(db, 'users/' + user.uid));
            const data = snap.val();
            window.userData = data;
            window.userId = user.uid;
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            initApp(data.plan, data.usage);
        }
    });

    window.logout = () => { auth.signOut(); location.reload(); };

    // Update Usage to DB
    window.updateUsage = async (newUsage) => {
        await update(ref(db, 'users/' + window.userId), { usage: newUsage });
    }
</script>

<script>
    function togglePremium() { document.getElementById('premiumModal').classList.toggle('hidden'); }

    function initApp(p, u) {
        document.getElementById('planLabel').innerText = p.toUpperCase();
        let limit = p === 'silver' ? 3 : (p === 'gold' ? 50 : "∞");
        document.getElementById('limitLabel').innerText = `Used: ${u}/${limit}`;
        
        if(p !== 'silver') document.getElementById('goldBox').classList.remove('hidden');
        if(p === 'diamond') document.getElementById('mLock').classList.add('hidden');
        else document.getElementById('mLock').classList.remove('hidden');
    }

    async function runWingo() {
        const p = window.userData.plan;
        const u = window.userData.usage;
        const max = p === 'silver' ? 3 : (p === 'gold' ? 50 : 999999);

        if(u >= max) return alert("Daily Limit Reached! Upgrade Plan.");

        const n = parseInt(document.getElementById('pastNo').value);
        if(isNaN(n)) return alert("Enter No!");
        
        document.getElementById('wRes').innerText = "CALCULATING";
        
        setTimeout(async () => {
            const size = (n + 3) % 10 >= 5 ? "BIG" : "SMALL";
            document.getElementById('wRes').innerText = size;
            document.getElementById('wRes').style.color = size === "BIG" ? "#f87171" : "#60a5fa";
            
            if(p !== 'silver') {
                document.getElementById('n1').innerText = (n+2)%10;
                document.getElementById('n2').innerText = (n+5)%10;
                document.getElementById('n3').innerText = (n+8)%10;
            }

            // Increase usage
            window.userData.usage++;
            initApp(p, window.userData.usage);
            await window.updateUsage(window.userData.usage);
        }, 800);
    }

    function runMines() {
        const tiles = document.querySelectorAll('.m-tile');
        tiles.forEach(t => { t.classList.remove('safe-tile'); t.innerHTML = ""; });
        let sel = []; while(sel.length < 5) { let r = Math.floor(Math.random()*25); if(!sel.includes(r)) sel.push(r); }
        sel.forEach((idx, i) => { setTimeout(() => { tiles[idx].classList.add('safe-tile'); tiles[idx].innerHTML = "⭐"; }, i*150); });
    }

    const grid = document.getElementById('mGrid');
    for(let i=0; i<25; i++) {
        const d = document.createElement('div');
        d.className = "m-tile h-full bg-slate-900 border border-slate-800 rounded-lg flex items-center justify-center text-xl transition-all";
        grid.appendChild(d);
    }
</script>
</body>
  </html>
